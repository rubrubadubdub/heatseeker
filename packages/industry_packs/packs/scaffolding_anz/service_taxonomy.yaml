    name: Design & engineering
    services:
      - {id: drafting_2d, name: 2D drafting}
      - {id: modelling_3d, name: 3D modelling}
      - {id: scaffold_design, name: Scaffold design}
      - {id: temporary_works_design, name: Temporary-works design}
      - {id: engineering_calculation, name: Engineering calculation}
      - {id: leg_load_calculation, name: Leg-load calculation}
      - {id: design_verification, name: Design verification}
      - {id: independent_checking, name: Independent checking}
