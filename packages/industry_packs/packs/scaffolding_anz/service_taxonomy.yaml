  - id: documentation
    name: Documentation & quantities
    services:
      - {id: quantity_take_off, name: Quantity take-off}
      - {id: bill_of_materials, name: Bill of materials}
      - {id: gear_list, name: Gear list}
      - {id: tender_drawing, name: Tender drawing}
      - {id: construction_issue_drawing, name: Construction issue drawing}
      - {id: as_built_documentation, name: As-built documentation}
