[project]
name = "heatseeker-lead-intelligence"
version = "0.1.0"
description = "Offerings, explained lead scoring, suppression, lead queue, XLSX export (M8)"
requires-python = ">=3.12"
dependencies = [
    "heatseeker-common",
    "heatseeker-core-domain",
    "heatseeker-entity-resolution",
    "heatseeker-intelligence",
    "heatseeker-knowledge-graph",
    "heatseeker-source-registry",
    "openpyxl>=3.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heatseeker_lead_intelligence"]

[tool.uv.sources]
heatseeker-common = { workspace = true }
heatseeker-core-domain = { workspace = true }
heatseeker-entity-resolution = { workspace = true }
heatseeker-intelligence = { workspace = true }
heatseeker-knowledge-graph = { workspace = true }
heatseeker-source-registry = { workspace = true }
