[project]
name = "heatseeker-common"
version = "0.1.0"
description = "Shared infrastructure: settings, logging, database, jobs, health, backup"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "sqlalchemy>=2.0.30",
    "alembic>=1.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heatseeker_common"]
