[project]
name = "heatseeker-source-registry"
version = "0.2.0"
description = "Canonical sources, contextual coverage, access policy, collection, and evidence (M2)"
requires-python = ">=3.12"
dependencies = [
    "defusedxml>=0.7",
    "heatseeker-common",
    "heatseeker-core-domain",
    "heatseeker-industry-packs",
    "httpx>=0.27",
    "openpyxl>=3.1",
    "pillow>=11.0",
    "protego>=0.3",
    "pypdf>=5.0",
    "python-docx>=1.1",
    "python-pptx>=1.0",
    "selectolax>=0.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heatseeker_source_registry"]

[tool.uv.sources]
heatseeker-common = { workspace = true }
heatseeker-core-domain = { workspace = true }
heatseeker-industry-packs = { workspace = true }
