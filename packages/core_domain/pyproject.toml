[project]
name = "heatseeker-core-domain"
version = "0.1.0"
description = "Industry-agnostic domain entities (populated from M4; see docs/roadmap.md)"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heatseeker_core_domain"]
