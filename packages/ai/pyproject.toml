[project]
name = "heatseeker-ai"
version = "0.1.0"
description = "Provider-neutral AI tasks and agentic source scouting"
requires-python = ">=3.12"
dependencies = [
    "heatseeker-common",
    "heatseeker-source-registry",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heatseeker_ai"]

[tool.uv.sources]
heatseeker-common = { workspace = true }
heatseeker-source-registry = { workspace = true }
