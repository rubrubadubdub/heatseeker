[project]
name = "heatseeker-intelligence"
version = "0.1.0"
description = "Evidence-to-conclusion layer: observations, fact assertions, confidence, classification, capabilities, sizing, research gaps, discovery (M5)"
requires-python = ">=3.12"
dependencies = [
    "heatseeker-common",
    "heatseeker-core-domain",
    "heatseeker-entity-resolution",
    "heatseeker-source-registry",
    "heatseeker-industry-packs",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heatseeker_intelligence"]

[tool.uv.sources]
heatseeker-common = { workspace = true }
heatseeker-core-domain = { workspace = true }
heatseeker-entity-resolution = { workspace = true }
heatseeker-source-registry = { workspace = true }
heatseeker-industry-packs = { workspace = true }
